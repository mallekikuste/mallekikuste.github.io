<!DOCTYPE html>
<html lang="en">
<head>

<!-- CHANGE: Page title shown in browser tab -->
<title>Malle Kikuste</title>

<!-- CHANGE: Replace favicon.ico with your favicon file -->
<link rel="icon" type="image/x-icon" href="favicon.ico">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- CHANGE: Replace with your own web font if desired -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* CHANGE: Global website colours, spacing and typography */
body{
margin:0;
font-family:'Inter', sans-serif;
background:#ffffff;
color:#0f0e1b;
}

/* CHANGE: Header layout, spacing and responsiveness */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:white;
position:sticky;
top:0;
z-index:10;
border-bottom:1px solid #eee;
}

/* CHANGE: Artist name styling */
.logo{
font-weight:600;
font-size:20px;
}

/* CHANGE: Navigation spacing and alignment */
nav a{
margin-left:24px;
text-decoration:none;
color:#111;
font-size:14px;
}

/* CHANGE: Hero section size, spacing and background */
.hero {
  height:70vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:40px;

  /* CHANGE: Hero background image */
  background-image: url('h1.png'); /* replace with your image path */
  background-size: cover;       /* ensures image covers whole hero area */
  background-position: center;  /* centers the image */
  background-repeat: no-repeat; /* prevents tiling */
}

/* CHANGE: Hero title styling */
.hero h1{
font-size:48px;
margin-bottom:10px;
}

/* CHANGE: Hero description styling */
.hero p{
max-width:600px;
}

/* CHANGE: Main gallery grid layout */
.gallery{
column-count:4;
column-gap:16px;
padding:40px;
}

/* CHANGE: Individual artwork spacing */
.artwork{
break-inside:avoid;
margin-bottom:16px;
}

/* CHANGE: Artwork image size and hover behaviour */
.artwork img{
width:100%;
cursor:pointer;
border-radius:6px;
}

/* CHANGE: Popup viewer background and alignment */
.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:20;
}

/* CHANGE: Popup media size */
.popup img, .popup iframe{
max-width:80%;
max-height:80%;
}

/* CHANGE: Close button styling */
.close{
position:absolute;
top:30px;
right:40px;
color:white;
font-size:30px;
cursor:pointer;
}

/* CHANGE: About and Contact page layout */
.section{
padding:80px 20%;
line-height:1.7;
}

/* CHANGE: Footer spacing */
footer{
padding:40px;
text-align:center;
font-size:14px;
}

@media(max-width:900px){

/* CHANGE: Gallery columns for tablet */
.gallery{
column-count:2;
}

}

@media(max-width:600px){

/* CHANGE: Gallery columns for mobile */
.gallery{
column-count:1;
}

}

</style>
</head>
<body>

<!-- HEADER NAVIGATION -->
<header>

<!-- CHANGE: Artist name text -->
<div class="logo">Malle Kikuste</div>

<nav>

<!-- CHANGE: Navigation labels and links -->
<a href="#about">About</a>
<a href="#cv">CV</a>
<a href="#works">Works</a>
<a href="#contact">Contact</a>

</nav>
</header>

<!-- HERO SECTION -->
<section class="hero">
<!-- CHANGE: Main homepage title -->
<h1>Multimedia Artist</h1>
<!-- CHANGE: Short introduction text -->
<p>Student at Latvian Art Academy</p>

</section>

<!-- WORKS GALLERY -->
<section id="works" class="gallery">

<!-- CHANGE: Replace image paths and popup behaviour -->
<div class="artwork"><img src="1.jpg" onclick="openPopup('1.jpg')"></div>
<div class="artwork"><img src="2.jpg" onclick="openPopup('2.jpg')"></div>
<div class="artwork"><img src="3.jpg" onclick="openPopup('3.jpg')"></div>
<div class="artwork"><img src="4.jpg" onclick="openPopup('4.jpg')"></div>

<!-- CHANGE: Example artwork that opens separate page -->
<div class="artwork"><a href="g5.html"><img src="g5.gif"></a></div>
<div class="artwork"><a href="g6.html"><img src="g6.gif"></a></div>
<div class="artwork"><a href="g7.html"><img src="g7.gif"></a></div>
<div class="artwork"><a href="g8.html"><img src="g8.gif"></a></div>

<!-- CHANGE: Additional popup artworks -->
<div class="artwork"><img src="9.png" onclick="openPopup('9.png')"></div>
<div class="artwork"><img src="10.png" onclick="openPopup('10.png')"></div>
<div class="artwork"><img src="11.png" onclick="openPopup('11.png')"></div>
<div class="artwork"><img src="12.png" onclick="openPopup('12.png')"></div>

</section>

<!-- ABOUT SECTION -->
<section id="about" class="section">

<!-- CHANGE: Artist biography text -->
<h2>About</h2>
<p>
just got here.
</p>

</section>

<!-- CONTACT SECTION -->
<section id="contact" class="section">

<!-- CHANGE: Contact text and social links -->
<h2>Contact</h2>
<p>Email: your@email.com</p>
<p>Instagram: @artist</p>
<p>Twitter: @artist</p>

</section>

<footer>

<!-- CHANGE: Footer text -->
© Malle Kikuste 2026

</footer>

<!-- POPUP VIEWER -->
<div class="popup" id="popup">
<span class="close" onclick="closePopup()">×</span>
<img id="popup-img">
</div>

<script>

/* CHANGE: Popup behaviour */
function openPopup(src){

document.getElementById('popup').style.display='flex';

document.getElementById('popup-img').src=src;

}

/* CHANGE: Close popup behaviour */
function closePopup(){

document.getElementById('popup').style.display='none';

}

</script>

</body>
</html>
