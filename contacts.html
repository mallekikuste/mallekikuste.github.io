<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- =============================
       PAGE TITLE
       Replace with your name.
       ============================= -->
  <title>Contacts — Your Name</title>

  <!-- =============================
       FAVICON
       Replace "favicon.ico" with your own favicon file path.
       ============================= -->
  <link rel="icon" href="favicon.ico" type="image/x-icon" />

  <!-- =============================
       GOOGLE FONTS
       Must match the font used in style.css.
       ============================= -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- =============================
       NAVIGATION
       Replace "Your Name" with your actual name.
       ============================= -->
  <nav class="nav">
    <a href="index.html" class="nav-name">Your Name</a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">gallery</a>
      <a href="about.html" class="nav-link">about me</a>
      <a href="contacts.html" class="nav-link active">contacts</a>
    </div>
  </nav>

  <!-- =============================
       CONTACTS PAGE CONTENT
       Replace the links and text below with your real details.
       Add or remove contact items as needed.
       ============================= -->
  <main class="contacts-main">

    <div class="contacts-block">

      <!-- =============================
           EMAIL
           Replace "youremail@example.com" with your actual email.
           ============================= -->
      <a href="mailto:youremail@example.com" class="contact-item">
        youremail@example.com
      </a>

      <!-- =============================
           INSTAGRAM
           Replace "@yourinstagram" and the href URL with your Instagram handle.
           ============================= -->
      <a href="https://instagram.com/yourinstagram" target="_blank" rel="noopener noreferrer" class="contact-item">
        @yourinstagram
      </a>

      <!-- =============================
           OPTIONAL EXTRA LINKS
           Uncomment and fill in if you want to add more links
           (Behance, LinkedIn, etc.)
           ============================= -->
      <!--
      <a href="https://behance.net/yourprofile" target="_blank" rel="noopener noreferrer" class="contact-item">
        Behance
      </a>
      -->

    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
